<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>气象预报解读助手</title>
  <meta name="description" content="气象预报解读助手：解释天气预报、预警预报、气象指标与 AI 气象预报模型，基于 WMO 指南与 GraphCast / Pangu-Weather 论文构建的知识问答 Agent。" />
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤</text></svg>" />
</head>
<body>
  <!-- 顶栏 -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-glyph" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.5 19a4.5 4.5 0 1 0-.42-8.98 6 6 0 1 0-11.06 3.1A3.5 3.5 0 0 0 7 19h10.5Z"/>
          </svg>
        </span>
        <span class="brand-name">气象预报解读助手</span>
        <span class="mode-pill" id="modePill" title="当前引擎模式">
          <span class="mode-dot" id="statusDot"></span>
          <span id="headerMode">本地知识引擎</span>
        </span>
      </div>
      <nav class="topbar-actions">
        <button class="icon-btn" id="btnIdeas" title="提问灵感">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-3.5 10.9c.7.5 1.1 1.3 1.2 2.1h4.6c.1-.8.5-1.6 1.2-2.1A6 6 0 0 0 12 3Z"/></svg>
          <span>提问灵感</span>
        </button>
        <button class="icon-btn" id="btnSettings" title="设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.65 8.9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.08A1.7 1.7 0 0 0 10.12 3V3a2 2 0 1 1 4 0v.09c0 .68.4 1.3 1.03 1.56.6.27 1.3.13 1.79-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.08c.26.63.88 1.03 1.56 1.03H21a2 2 0 1 1 0 4h-.09c-.68 0-1.3.4-1.51 1.03Z"/></svg>
          <span>设置</span>
        </button>
        <button class="icon-btn primary" id="btnClear" title="开始新对话">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          <span>新对话</span>
        </button>
      </nav>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="page">
    <!-- 空状态 Hero -->
    <section class="hero" id="hero">
      <h1 class="hero-title" id="heroGreeting">把预报，讲成人话。</h1>
      <p class="hero-sub">解读天气预报、预警信号、气象指标与 AI 气象模型 —— 每个答案都有出处。</p>
      <div class="hero-cards" id="heroCards"></div>
      <p class="hero-foot" id="kbStats"></p>
    </section>

    <!-- 对话流 -->
    <div class="thread" id="messages" aria-live="polite"></div>
  </main>

  <!-- 输入区 -->
  <footer class="composer-wrap">
    <form id="composerForm" class="composer">
      <textarea id="input" rows="1" placeholder="问点什么…  例如：降水概率 70% 是什么意思？" autocomplete="off"></textarea>
      <button type="submit" id="btnSend" class="send-btn" aria-label="发送">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      </button>
    </form>
    <p class="composer-hint">回答依据 WMO 指南 · GraphCast / Pangu-Weather 论文 · Open-Meteo 数据。安全决策请以官方预报预警为准。</p>
  </footer>

  <!-- 提问灵感抽屉 -->
  <aside class="ideas-drawer" id="ideasDrawer" aria-hidden="true">
    <div class="ideas-head">
      <h2>提问灵感</h2>
      <button class="icon-btn" id="btnCloseIdeas" aria-label="关闭">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="ideas-body" id="suggestNav"></div>
  </aside>
  <div class="scrim" id="scrim" hidden></div>

  <!-- 设置弹窗 -->
  <dialog id="settingsDialog" class="settings-dialog">
    <form method="dialog" class="settings-form">
      <h2>模型设置</h2>
      <p class="settings-desc">默认使用<strong>本地知识引擎</strong>（零成本、可离线、答案 100% 来自知识库）。填入任意 OpenAI 兼容接口后升级为<strong>全能模式</strong>：模型可自主调用气象知识库、实时天气、时间与联网搜索四个工具，回答任意问题；气象专业问题仍强制引用知识库来源。Key 仅存于浏览器本地。</p>
      <label>API Base URL
        <input type="text" id="llmBase" placeholder="https://api.openai.com/v1（或兼容接口）" />
      </label>
      <label>API Key
        <input type="password" id="llmKey" placeholder="sk-…" />
      </label>
      <label>模型名称
        <input type="text" id="llmModel" placeholder="gpt-4o-mini / deepseek-chat 等" />
      </label>
      <div class="settings-actions">
        <button value="cancel" class="btn ghost">取消</button>
        <button value="save" id="btnSaveSettings" class="btn solid">保存</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="src/app.js"></script>
</body>
</html>
